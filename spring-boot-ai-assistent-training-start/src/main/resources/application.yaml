thinkenterprise:
  exception: true
logging:
  level:
    org.apache.pdfbox: ERROR

spring:
  application:
    name: spring-ai-assistent
  profiles:
    active:
    - Nothing

  ai:
    tools:
      throw-exception-on-error: true
    ollama:
      chat:
        model: llama3.2 
        options:
          max-tokens: 512
        internal-tool-execution-enabled: true
        temperature: 0.7
        num-ctx: 2048